<div class="page-container">

  <a routerLink="/incidents" class="back-link">← Back to incidents</a>

  <h1 class="section-title">
    {{ isEditMode ? 'Edit incident' : 'Log new incident' }}
  </h1>

  <div *ngIf="loading" class="loading-msg">Loading...</div>
  <div *ngIf="error" class="error-msg">{{ error }}</div>

  <form *ngIf="!loading" (ngSubmit)="save()">

    <div class="card">
      <h3 class="card-title">Incident details</h3>
      <div class="form-grid">

        <div class="form-field">
          <label>Client *</label>
          <select [(ngModel)]="formData.client" name="client" required class="form-input">
            <option value="">Select a client...</option>
            <ng-container *ngFor="let client of clients">
              <option [value]="client.id">{{ client.full_name }}</option>
            </ng-container>
          </select>
        </div>

        <div class="form-field">
          <label>Date and time *</label>
          <input [(ngModel)]="formData.date_occurred" name="date_occurred"
                 type="datetime-local" required class="form-input" />
        </div>

        <div class="form-field">
          <label>Incident type *</label>
          <select [(ngModel)]="formData.incident_type" name="incident_type" class="form-input">
            <option value="fall">Fall</option>
            <option value="medication">Medication error</option>
            <option value="behaviour">Behaviour</option>
            <option value="injury">Injury</option>
            <option value="safeguarding">Safeguarding</option>
            <option value="near_miss">Near miss</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-field">
          <label>Severity *</label>
          <select [(ngModel)]="formData.severity" name="severity" class="form-input">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="critical">Critical</option>
          </select>
        </div>

        <div class="form-field">
          <label>Location</label>
          <input [(ngModel)]="formData.location" name="location" class="form-input"
                 placeholder="e.g. Bedroom, Lounge, Garden" />
        </div>

        <div class="form-field">
          <label>Status</label>
          <select [(ngModel)]="formData.status" name="status" class="form-input">
            <option value="open">Open</option>
            <option value="under_review">Under review</option>
            <option value="closed">Closed</option>
          </select>
        </div>

        <div class="form-field full-width">
          <label>Description *</label>
          <textarea [(ngModel)]="formData.description" name="description"
                    required class="form-input" rows="4"
                    placeholder="Describe what happened in detail..."></textarea>
        </div>

        <div class="form-field full-width">
          <label>Immediate action taken</label>
          <textarea [(ngModel)]="formData.immediate_action" name="immediate_action"
                    class="form-input" rows="3"
                    placeholder="What action was taken immediately after the incident?"></textarea>
        </div>

        <div class="form-field full-width">
          <label>Witnesses</label>
          <input [(ngModel)]="formData.witnesses" name="witnesses" class="form-input"
                 placeholder="Names of any witnesses present" />
        </div>

        <div class="form-field full-width">
          <label>Follow up required</label>
          <textarea [(ngModel)]="formData.follow_up" name="follow_up"
                    class="form-input" rows="2"
                    placeholder="Any follow up actions required?"></textarea>
        </div>

      </div>
    </div>

    <div class="form-actions">
      <a routerLink="/incidents" class="btn-cancel">Cancel</a>
      <button type="submit" [disabled]="saving" class="btn-save">
        {{ saving ? 'Saving...' : (isEditMode ? 'Save changes' : 'Log incident') }}
      </button>
    </div>

  </form>

</div>
