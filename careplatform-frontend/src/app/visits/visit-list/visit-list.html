<div class="page-container">

  <div class="list-header">
    <h1 class="section-title">Visit Logs</h1>
    <a routerLink="/visits/new" class="btn-primary">+ Log visit</a>
  </div>

  <div class="filters card">
    <input class="search-input" [(ngModel)]="searchTerm" placeholder="Search..." />

    <select class="role-select" [(ngModel)]="selectedStaff">
      <option value="">All staff</option>
      <option value="Brian Mbevi">Brian Mbevi</option>
      <option value="Sarah Lee">Sarah Lee</option>
    </select>
  </div>

  <div *ngIf="loading" class="loading-msg">Loading visits...</div>
  <div *ngIf="error" class="error-msg">{{ error }}</div>

  <div *ngIf="!loading && !error" class="card">
    <div *ngIf="filtered.length === 0" class="empty-state">
      No visit logs found.
    </div>

    <table *ngIf="filtered.length > 0" class="incident-table">
      <thead>
        <tr>
          <th>Client</th>
          <th>Staff</th>
          <th>Date</th>
          <th>Time</th>
          <th>Type</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>

      <tbody>
        <ng-container *ngFor="let visit of filtered">
          <tr>
            <td class="client-name">{{ visit.client_name }}</td>
            <td>{{ visit.staff_name }}</td>
            <td>{{ visit.date | date:'dd/MM/yyyy' }}</td>
            <td>{{ visit.time }}</td>

            <td>
              <span class="badge" [ngClass]="getTypeBadge(visit.type)">
                {{ visit.type }}
              </span>
            </td>

            <td>
              <span class="badge" [ngClass]="getStatusBadge(visit.status)">
                {{ visit.status }}
              </span>
            </td>

            <td>
              <a [routerLink]="['/visits', visit.id]" class="view-link">View</a>
            </td>
          </tr>
        </ng-container>
      </tbody>
    </table>
  </div>

</div>
