<div class="page-container">

  <a routerLink="/staff" class="back-link">← Back to staff</a>

  <h1 class="section-title">
    {{ isEditMode ? 'Edit staff member' : 'Add new staff member' }}
  </h1>

  <div *ngIf="loading" class="loading-msg">Loading...</div>
  <div *ngIf="error" class="error-msg">{{ error }}</div>

  <form *ngIf="!loading" (ngSubmit)="save()">

    <div class="card">
      <h3 class="card-title">Personal details</h3>
      <div class="form-grid">
        <div class="form-field">
          <label>First name *</label>
          <input [(ngModel)]="formData.first_name" name="first_name" required class="form-input" />
        </div>
        <div class="form-field">
          <label>Last name *</label>
          <input [(ngModel)]="formData.last_name" name="last_name" required class="form-input" />
        </div>
        <div class="form-field">
          <label>Email *</label>
          <input [(ngModel)]="formData.email" name="email" type="email" required class="form-input" />
        </div>
        <div class="form-field">
          <label>Phone</label>
          <input [(ngModel)]="formData.phone" name="phone" class="form-input" />
        </div>
        <div class="form-field">
          <label>Date of birth</label>
          <input [(ngModel)]="formData.date_of_birth" name="date_of_birth" type="date" class="form-input" />
        </div>
        <div class="form-field">
          <label>NI number</label>
          <input [(ngModel)]="formData.ni_number" name="ni_number" class="form-input" />
        </div>
        <div class="form-field full-width">
          <label>Address</label>
          <textarea [(ngModel)]="formData.address" name="address" class="form-input" rows="2"></textarea>
        </div>
      </div>
    </div>

    <div class="card">
      <h3 class="card-title">Employment details</h3>
      <div class="form-grid">
        <div class="form-field">
          <label>Job title</label>
          <input [(ngModel)]="formData.job_title" name="job_title" class="form-input" />
        </div>
        <div class="form-field">
          <label>Role *</label>
          <select [(ngModel)]="formData.role" name="role" class="form-input">
            <option value="admin">Admin</option>
            <option value="manager">Manager</option>
            <option value="senior_carer">Senior Carer</option>
            <option value="carer">Carer</option>
          </select>
        </div>
        <div class="form-field">
          <label>Contract type</label>
          <select [(ngModel)]="formData.contract_type" name="contract_type" class="form-input">
            <option value="full_time">Full time</option>
            <option value="part_time">Part time</option>
            <option value="bank">Bank / zero hours</option>
          </select>
        </div>
        <div class="form-field">
          <label>Start date</label>
          <input [(ngModel)]="formData.start_date" name="start_date" type="date" class="form-input" />
        </div>
      </div>
    </div>

    <div class="card">
      <h3 class="card-title">Next of kin</h3>
      <div class="form-grid">
        <div class="form-field">
          <label>Name</label>
          <input [(ngModel)]="formData.nok_name" name="nok_name" class="form-input" />
        </div>
        <div class="form-field">
          <label>Phone</label>
          <input [(ngModel)]="formData.nok_phone" name="nok_phone" class="form-input" />
        </div>
        <div class="form-field">
          <label>Relationship</label>
          <input [(ngModel)]="formData.nok_relationship" name="nok_relationship" class="form-input" />
        </div>
      </div>
    </div>

    <div class="card" *ngIf="!isEditMode">
      <h3 class="card-title">Login credentials</h3>
      <div class="form-grid">
        <div class="form-field">
          <label>Username *</label>
          <input [(ngModel)]="formData.username" name="username" required class="form-input" />
        </div>
        <div class="form-field">
          <label>Password *</label>
          <input [(ngModel)]="formData.password" name="password" type="password" required class="form-input" />
        </div>
      </div>
    </div>

    <div class="form-actions">
      <a routerLink="/staff" class="btn-cancel">Cancel</a>
      <button type="submit" [disabled]="saving" class="btn-save">
        {{ saving ? 'Saving...' : (isEditMode ? 'Save changes' : 'Create staff member') }}
      </button>
    </div>

  </form>

</div>
