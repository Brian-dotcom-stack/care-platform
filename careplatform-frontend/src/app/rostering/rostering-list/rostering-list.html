<div class="page-container">
  <div class="list-header">
    <h1 class="section-title">Staff Roster</h1>
    <a routerLink="/rostering/new" class="btn-primary">+ Allocate Shift</a>
  </div>

  <div *ngIf="loading" class="loading-msg">Loading roster...</div>

  <div class="card" *ngIf="!loading">
    <div *ngIf="shifts.length === 0" class="empty-state">No shifts found in the system.</div>
    
    <table class="roster-table" *ngIf="shifts.length > 0">
      <thead>
        <tr>
          <th>Date</th>
          <th>Staff</th>
          <th>Client</th>
          <th>Shift</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let shift of shifts">
          <td>{{ shift.start_time | date:'dd/MM/yyyy' }}</td>
          <td><strong>{{ shift.staff_name }}</strong></td>
          <td>{{ shift.client_name }}</td>
          <td>{{ shift.start_time | date:'HH:mm' }} - {{ shift.end_time | date:'HH:mm' }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
