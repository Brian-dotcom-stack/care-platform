<ng-container *ngIf="auth.isLoggedIn(); else loginView">
  <div class="app-shell">
    <aside class="sidebar">

      <div class="sidebar-logo">
        <img
          [src]="isDarkMode ? 'assets/logo/careconnect-dark.png' : 'assets/logo/careconnect-light.png'"
          alt="CareConnect" class="logo-img"
          onerror="this.style.display='none'"
        />
        <div class="logo-org">Medicare Support & Housing Ltd</div>
      </div>

      <nav class="sidebar-nav">
        <a routerLink="/Dashboard" routerLinkActive="active" class="nav-item">Dashboard</a>
        <div class="nav-section">People</div>
        <a routerLink="/staff"   routerLinkActive="active" class="nav-item">Staff</a>
        <a routerLink="/clients" routerLinkActive="active" class="nav-item">Clients</a>
        <a *ngIf="auth.isManagerOrAbove()"
           routerLink="/social-workers" routerLinkActive="active" class="nav-item">
          Social workers
        </a>

        <div class="nav-section">Operations</div>
        <a routerLink="/rostering"  routerLinkActive="active" class="nav-item">Rostering</a>
        <a routerLink="/incidents"  routerLinkActive="active" class="nav-item">Incidents</a>

        <div class="nav-section">Records</div>
        <a routerLink="/health" routerLinkActive="active" class="nav-item">Health reports</a>
        <a routerLink="/abc"    routerLinkActive="active" class="nav-item">ABC charts</a>

        <ng-container *ngIf="auth.isManagerOrAbove()">
          <div class="nav-section">Management</div>
          <a routerLink="/finance"     routerLinkActive="active" class="nav-item">Finance</a>
          <a routerLink="/leaderboard" routerLinkActive="active" class="nav-item">Leaderboard</a>
          <a routerLink="/staff/compliance" routerLinkActive="active" class="nav-item">Compliance</a>
        </ng-container>
      </nav>

      <div style="padding: 8px;">
        <button class="theme-toggle" (click)="toggleDarkMode()">
          {{ isDarkMode ? '☀ Light mode' : '🌙 Dark mode' }}
        </button>
      </div>

      <div class="sidebar-user">
        <div class="avatar">{{ getInitials() }}</div>
        <div>
          <div class="user-name">{{ auth.getFullName() }}</div>
          <div class="user-role">{{ auth.getRole() }}</div>
        </div>
        <button class="logout-btn" (click)="auth.logout()" title="Log out">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6"
                  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

    </aside>

    <main class="main-content">
      <router-outlet />
    </main>
  </div>
</ng-container>

<ng-template #loginView>
  <router-outlet />
</ng-template>
