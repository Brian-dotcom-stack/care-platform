<ng-container *ngIf="isLoggedIn(); else loginView">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">CC</div>
        <div>
          <div class="logo-name">CareConnect</div>
          <div class="logo-org">Medicare Support & Housing Ltd</div>
        </div>
      </div>
      

      <nav class="sidebar-nav">
        <div class="nav-section">People</div>
        <a routerLink="/staff" routerLinkActive="active" class="nav-item">Staff</a>
        <a routerLink="/clients" routerLinkActive="active" class="nav-item">Clients</a>

        <div class="nav-section">Operations</div>
        <a routerLink="/rostering" routerLinkActive="active" class="nav-item">Rostering</a>
        <a routerLink="/incidents" routerLinkActive="active" class="nav-item">Incidents</a>

        <div class="nav-section">Records</div>
        <a routerLink="/health" routerLinkActive="active" class="nav-item">Health reports</a>
        <a routerLink="/abc" routerLinkActive="active" class="nav-item">ABC charts</a>
      </nav>

      <div class="sidebar-user">
        <div style="display: flex; align-items: center; gap: 12px;">
          <div class="avatar">BM</div>
          <div>
            <div class="user-name">Brian M.</div>
            <div class="user-role">Senior Carer</div>
          </div>
        </div>
        
        <button (click)="logout()" class="logout-btn" title="Logout">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <router-outlet />
    </main>
  </div>
</ng-container>

<ng-template #loginView>
  <router-outlet />
</ng-template>
